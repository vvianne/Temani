<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temani - Tambahkan Mood</title>
  <link rel="stylesheet" href="mood.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <nav class="navbar">
      <a href="beranda.html">Beranda</a>
      <a href="diari.html">Diari Hamil</a>
      <a href="#">Belajar</a>
      <a href="#">Gejala</a>
      <button class="btn-masuk">Masuk</button>
    </nav>
    <div class="hero-text">
      <h1>Halo, Amanda!</h1>
      <p>Bagaimana kondisimu hari ini? Ayo konsultasikan dengan kami!</p>
    </div>
  </header>

  <!-- Diary -->
  <section class="diary">
    <div class="mood-box">
      <div class="mood-info">
        <h2>Perasaan Anda saat ini?</h2>
        <p><strong>Sedih dan Bingung</strong></p>
        <p>Hari ini Anda merasa sedih karena suami pulang terlambat tanpa kabar... (dst)</p>
      </div>
      <button class="btn-tambah-mood">+ Mood</button>
    </div>
  </section>

  <!-- Input Mood -->
  <section class="input-mood">
    <div class="mood-frame">
      <div class="mood-header">
        <label>Masukkan kondisi mood Anda</label>
        <input type="text" placeholder="Saya merasa senang dan tenang.">
      </div>
      <div class="mood-options">
        <div class="mood-icon" style="background:#00B67A"></div>
        <div class="mood-icon" style="background:#00C2FF"></div>
        <div class="mood-icon" style="background:#FF9020"></div>
        <div class="mood-icon" style="background:#D93644"></div>
        <div class="mood-icon" style="background:#9B72CF"></div>
      </div>
      <button class="btn-tambahkan">Tambahkan</button>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <h2>TEMANI</h2>
      <p>@temani.ibu</p>
      <p>0812-3456-7890</p>
      <p>temani@gmail.com</p>
    </div>
  </footer>
</body>
</html>
